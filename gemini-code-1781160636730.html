<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definite Integral Calculator & Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/math.js/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            color: #0f172a;
        }

        p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--border);
            padding-right: 20px;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
            .control-panel {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid var(--border);
                padding-bottom: 20px;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
        }

        input[type="text"] {
            padding: 10px 14px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
            font-family: monospace;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .slider-container {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 6px;
            font-family: monospace;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }

        .result-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 8px;
            margin-top: auto;
        }

        .result-math {
            font-size: 1.2rem;
            font-family: serif;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary);
            font-family: monospace;
        }

        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            min-height: 450px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <header>
        <h1>Definite Integral Visualizer</h1>
        <p>A simpler alternative to Desmos for parsing, plotting, and calculating integrals.</p>
    </header>

    <div class="container">
        <div class="control-panel">
            <div class="input-group">
                <label for="function-input">Function f(x)</label>
                <input type="text" id="function-input" value="x^2 - 1" placeholder="e.g., sin(x), x^3 - 2*x">
                <div id="error-box" class="error-message">Invalid mathematical expression.</div>
            </div>

            <div class="slider-container">
                <div class="slider-header">
                    <span>Lower bound (a)</span>
                    <span id="lbl-a">0.0</span>
                </div>
                <input type="range" id="param-a" min="-10" max="10" step="0.1" value="0">
            </div>

            <div class="slider-container">
                <div class="slider-header">
                    <span>Upper bound (b)</span>
                    <span id="lbl-b">3.0</span>
                </div>
                <input type="range" id="param-b" min="-10" max="10" step="0.1" value="3">
            </div>

            <div class="result-box">
                <div class="result-math">∫<sub>a</sub><sup>b</sup> f(x) dx =</div>
                <div id="result-display" class="result-value">0.0000</div>
            </div>
        </div>

        <div class="canvas-container" id="canvas-wrapper">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <script>
        // DOM Elements
        const fInput = document.getElementById('function-input');
        const sliderA = document.getElementById('param-a');
        const sliderB = document.getElementById('param-b');
        const lblA = document.getElementById('lbl-a');
        const lblB = document.getElementById('lbl-b');
        const resultDisplay = document.getElementById('result-display');
        const errorBox = document.getElementById('error-box');
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        // Graph view parameters configuration (Cartesian coordinates bounds)
        const xMin = -5;
        const xMax = 5;
        const yMin = -5;
        const yMax = 5;

        let compiledExpr = null;

        // Compile user string into a safe function using Math.js
        function updateFunction() {
            try {
                compiledExpr = math.compile(fInput.value);
                errorBox.style.display = 'none';
                return true;
            } catch (err) {
                errorBox.style.display = 'block';
                return false;
            }
        }

        // Evaluate f(x) safely
        function f(x) {
            if (!compiledExpr) return 0;
            try {
                let value = compiledExpr.evaluate({ x: x });
                return typeof value === 'number' ? value : NaN;
            } catch (e) {
                return NaN;
            }
        }

        // Compute definite integral using Simpson's Rule approximation method
        function calculateIntegral(a, b) {
            const n = 1000; // Intervals amount (even number)
            const h = (b - a) / n;
            let sum = f(a) + f(b);

            for (let i = 1; i < n; i++) {
                let x = a + i * h;
                if (i % 2 === 0) {
                    sum += 2 * f(x);
                } else {
                    sum += 4 * f(x);
                }
            }
            return (h / 3) * sum;
        }

        // Coordinate Conversions: Math World coordinates to HTML Canvas Screen Pixel space
        function toScreenX(x) {
            return ((x - xMin) / (xMax - xMin)) * canvas.width;
        }

        function toScreenY(y) {
            return canvas.height - ((y - yMin) / (yMax - yMin)) * canvas.height;
        }

        // Core Render loop function
        function draw() {
            // Match canvas sizing to its fluid CSS layout dynamically
            if (canvas.width !== wrapper.clientWidth || canvas.height !== wrapper.clientHeight) {
                canvas.width = wrapper.clientWidth;
                canvas.height = wrapper.clientHeight;
            }

            const a = parseFloat(sliderA.value);
            const b = parseFloat(sliderB.value);

            lblA.textContent = a.toFixed(1);
            lblB.textContent = b.toFixed(1);

            // Compute math data
            let integralVal = calculateIntegral(a, b);
            if (isNaN(integralVal)) {
                resultDisplay.textContent = "Error";
            } else {
                resultDisplay.textContent = integralVal.toFixed(4);
            }

            // Clear Screen Canvas canvas grid
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Coordinate Grid Lines
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            
            // X-Grid
            for(let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
                let sX = toScreenX(x);
                ctx.beginPath();
                ctx.moveTo(sX, 0);
                ctx.lineTo(sX, canvas.height);
                ctx.stroke();
            }
            // Y-Grid
            for(let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
                let sY = toScreenY(y);
                ctx.beginPath();
                ctx.moveTo(0, sY);
                ctx.lineTo(canvas.width, sY);
                ctx.stroke();
            }

            // Draw Core Axis lines (X & Y Axis lines)
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            
            // X Axis
            ctx.beginPath();
            ctx.moveTo(0, toScreenY(0));
            ctx.lineTo(canvas.width, toScreenY(0));
            ctx.stroke();
            
            // Y Axis
            ctx.beginPath();
            ctx.moveTo(toScreenX(0), 0);
            ctx.lineTo(toScreenX(0), canvas.height);
            ctx.stroke();

            // 1. Draw Shaded Integral Area under curve between bounded [a, b] limits
            if (compiledExpr) {
                ctx.fillStyle = 'rgba(37, 99, 235, 0.25)'; // Semi-transparent primary blue tint
                ctx.beginPath();
                
                let startX = Math.min(a, b);
                let endX = Math.max(a, b);
                let steps = 200;
                let stepSize = (endX - startX) / steps;

                // Move to baseline origin corner start point
                ctx.moveTo(toScreenX(startX), toScreenY(0));

                for (let i = 0; i <= steps; i++) {
                    let curX = startX + i * stepSize;
                    let curY = f(curX);
                    if(!isNaN(curY)) {
                        ctx.lineTo(toScreenX(curX), toScreenY(curY));
                    }
                }
                
                // Close back down loop path to baseline zero edge bounds
                ctx.lineTo(toScreenX(endX), toScreenY(0));
                ctx.closePath();
                ctx.fill();
            }

            // 2. Draw Plotting Curve function lines
            if (compiledExpr) {
                ctx.strokeStyle = '#2563eb';
                ctx.lineWidth = 3;
                ctx.beginPath();

                let totalPixels = canvas.width;
                let first = true;

                for (let px = 0; px <= totalPixels; px++) {
                    // map screen canvas pixel back to standard algebra cartesian space
                    let mx = xMin + (px / totalPixels) * (xMax - xMin);
                    let my = f(mx);

                    if (!isNaN(my) && isFinite(my)) {
                        let py = toScreenY(my);
                        if (first) {
                            ctx.moveTo(px, py);
                            first = false;
                        } else {
                            ctx.lineTo(px, py);
                        }
                    } else {
                        first = true; // reset line path segment if expression hits infinite limits
                    }
                }
                ctx.stroke();
            }

            // 3. Draw Bound vertical border lines limits anchors
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]); // Dashed line effect

            // Bound A Line indicator
            ctx.strokeStyle = '#dc2626'; // Red indicator
            ctx.beginPath();
            ctx.moveTo(toScreenX(a), 0);
            ctx.lineTo(toScreenX(a), canvas.height);
            ctx.stroke();

            // Bound B Line indicator
            ctx.strokeStyle = '#16a34a'; // Green indicator
            ctx.beginPath();
            ctx.moveTo(toScreenX(b), 0);
            ctx.lineTo(toScreenX(b), canvas.height);
            ctx.stroke();

            ctx.setLineDash([]); // clear dash formatting array attributes mapping
        }

        // Live App UI Event bindings mapping
        fInput.addEventListener('input', () => {
            if(updateFunction()) {
                draw();
            }
        });

        sliderA.addEventListener('input', draw);
        sliderB.addEventListener('input', draw);
        
        // Handle UI adjustments window resizing loops dynamically
        window.addEventListener('resize', draw);

        // Bootstrap Initial application render setup loops
        updateFunction();
        draw();
    </script>
</body>
</html>
